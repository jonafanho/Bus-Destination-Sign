[env:esp32]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

board_build.flash_size = 16MB
board_build.psram = disabled

lib_deps =
	symlink://../lib/init_print
	symlink://../lib/spi_helper
	symlink://../lib/display_transaction
	symlink://../lib/display_driver
