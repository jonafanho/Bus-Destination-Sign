name: Build
on: [ pull_request, push, workflow_dispatch ]

jobs:
  build-spring-boot:
    name: Build Spring Boot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: 24
      - name: Install Node packages
        run: npm ci --prefix website
      - name: Build Angular
        run: npm run build --prefix website
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@main
      - name: Setup JDK 21
        uses: actions/setup-java@main
        with:
          java-version: 21
          distribution: 'zulu'
          cache: gradle
      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Build JAR
        run: ./gradlew build --no-daemon
      - name: Upload Spring Boot JAR
        uses: actions/upload-artifact@main
        with:
          name: Spring Boot JAR
          path: build/libs/RC-Bus-System.jar

  build-platformio:
    name: Build PlatformIO
    strategy:
      fail-fast: false
      matrix:
        project: [ master, display ]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esp32/${{ matrix.project }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
      - name: Set up Python
        uses: actions/setup-python@main
        with:
          python-version: "3.11"
      - name: Cache PlatformIO and pip
        uses: actions/cache@main
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Build
        run: pio run
      - name: Upload build artifacts
        uses: actions/upload-artifact@main
        with:
          name: ESP32-Firmware-${{ matrix.project }}
          path: esp32/${{ matrix.project }}/.pio/build/esp32/firmware.*
